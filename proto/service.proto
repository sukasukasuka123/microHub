syntax = "proto3";

package micro_service_mvp;

option go_package = "./gen";

// Hub 向 Tool 派发的任务请求
message ToolRequest {
    string from         = 1;  // 发送方标识，如 "hub"
    string service_name = 2;  // 目标服务 name，对照 registry 的 name 字段
    string method       = 3;  // 调用的方法
    map<string, string> params = 4;
}

// Tool 返回给 Hub 的执行结果
message ToolResponse {
    string service_name   = 1;
    string status = 2;
    string result = 3;
}

// 注册表中 tool 实例的元数据（预留 hub 推送场景）
message ToolEntry {
    string addr   = 1;
    string method = 2;
}
// dispatch是派遣发送的意思
service HubService {
    rpc DispatchStream (stream ToolRequest) returns (stream ToolResponse);
    rpc DispatchSimple (ToolRequest)        returns (ToolResponse);
}
