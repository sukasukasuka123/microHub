syntax = "proto3";

package micro_service_mvp;

option go_package = "./gen";

message ToolRequest {
    string hub_name     = 1;
    string task_id      = 2;
    string method       = 3;
    // 新字段：JSON 序列化的入参（bytes）
    bytes params        = 4;
}

message ToolResponse {
    string tool_name        = 1;
    string task_id          = 2;
    string status           = 3;   // "ok", "error", "partial"
    bytes result            = 4;
    repeated ErrorDetail errors = 5;
}

message ErrorDetail {
    string code    = 1;  // e.g. "INVALID_PARAM", "API_ERROR"
    string message = 2;
    string field   = 3;  // e.g. "city"
    string help    = 4;  // 可选提示
}
// 注册表中 tool 实例的元数据（预留 hub 推送场景）
message ToolEntry {
    string addr   = 1;
    string method = 2;
}
// dispatch是派遣发送的意思
service HubService {
    rpc DispatchStream (stream ToolRequest) returns (stream ToolResponse);
    rpc DispatchSimple (ToolRequest)        returns (ToolResponse);
}
